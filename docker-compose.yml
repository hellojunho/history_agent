version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
    ports:
      - "11000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:20000
    volumes:
      - ./frontend/public:/app/public
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "20000:3000"
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=user
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=hanneunggeom
      - JWT_SECRET=your_super_secret_key
    volumes:
      - ./download:/app/download
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    ports:
      - "55500:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=hanneunggeom
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
